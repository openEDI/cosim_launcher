apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensor-deployment
spec:
  selector:
    matchLabels:
      app: sensor
  replicas: 1
  template:
    metadata:
      labels:
        app: sensor
    spec:
      containers:
      - name: sensor
        image: sensor:latest
        ports:
        - containerPort: 5000
        imagePullPolicy: Never

---

apiVersion: v1
kind: Service
metadata:
  name: sensor-service
spec:
  selector:
    app: sensor
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP
