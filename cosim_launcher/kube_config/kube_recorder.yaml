apiVersion: apps/v1
kind: Deployment
metadata:
  name: recorder-deployment
spec:
  selector:
    matchLabels:
      app: recorder
  replicas: 1
  template:
    metadata:
      labels:
        app: recorder
    spec:
      containers:
      - name: recorder
        image: recorder:latest
        ports:
        - containerPort: 5000
        imagePullPolicy: Never

---

apiVersion: v1
kind: Service
metadata:
  name: recorder-service
spec:
  selector:
    app: recorder
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP
