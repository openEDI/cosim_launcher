apiVersion: apps/v1
kind: Deployment
metadata:
  name: cosim-launcher-deployment
spec:
  selector:
    matchLabels:
      app: cosim-launcher
  replicas: 1
  template:
    metadata:
      labels:
        app: cosim-launcher
    spec:
      containers:
      - name: cosim-launcher
        image: cosim-launcher:latest
        ports:
        - containerPort: 5100
        imagePullPolicy: Never # using local images for testing

---

#apiVersion: v1 # we will switch to loadbalancer when external IP can be assigned i.e. in a cloud env
#kind: Service
#metadata:
