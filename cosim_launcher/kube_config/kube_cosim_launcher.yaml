#    app: cosim-launcher
#  ports:
#    - protocol: TCP
#      port: 5100
#      targetPort: 5100

apiVersion: v1
kind: Service
metadata:
  name: cosim-launcher-service
spec:
  selector:
    app: cosim-launcher
  ports:
    - protocol: TCP
      port: 5100
      targetPort: 5100
  type: ClusterIP
