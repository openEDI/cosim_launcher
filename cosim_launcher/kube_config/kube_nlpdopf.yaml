apiVersion: apps/v1
kind: Deployment
metadata:
  name: nlpdopf-deployment
spec:
  selector:
    matchLabels:
      app: nlpdopf
  replicas: 1
  template:
    metadata:
      labels:
        app: nlpdopf
    spec:
      containers:
      - name: nlpdopf
        image: nlpdopf:latest
        ports:
        - containerPort: 5000
        imagePullPolicy: Never # using local images for testing

---

apiVersion: v1
kind: Service
metadata:
  name: nlpdopf-service
spec:
  selector:
    app: nlpdopf
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP
