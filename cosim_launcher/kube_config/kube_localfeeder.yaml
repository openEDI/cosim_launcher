apiVersion: apps/v1
kind: Deployment
metadata:
  name: localfeeder-deployment
spec:
  selector:
    matchLabels:
      app: localfeeder
  replicas: 1
  template:
    metadata:
      labels:
        app: localfeeder
    spec:
      containers:
      - name: localfeeder
        image: localfeeder:latest
        ports:
        - containerPort: 5000
        imagePullPolicy: Never
        resources:
          requests:
            cpu: "750m" # 0.75 cores

---

apiVersion: v1
kind: Service
metadata:
  name: localfeeder-service
spec:
  selector:
    app: localfeeder
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP
